name: secret-scan

# Enforceable secret scanning in CI. This complements GitHub's native secret
# scanning + push protection (enable those in Settings → Code security), and
# runs even on forks/branches where the native setting may not apply.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so historical leaks are caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
